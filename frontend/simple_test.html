<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-area { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .upload-zone { 
            border: 2px dashed #666; 
            padding: 40px; 
            text-align: center; 
            cursor: pointer;
            background: #f9f9f9;
        }
        .upload-zone:hover { background: #f0f0f0; }
        .result { margin-top: 10px; padding: 10px; background: #f0f0f0; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <!-- Top navigation -->
    <nav class="navbar">
        <div class="nav-inner">
            <a class="brand" href="index.html">Knowledge-base</a>
            <div class="nav-links">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="index.html#uploadArea">Upload</a>
                <a class="nav-link" href="index.html#documentsList">Documents</a>
                <a class="nav-link" href="how-to-use.html">How to Use</a>
            </div>
        </div>
    </nav>

    <h1 style="margin-top: 24px;">Simple Upload Test</h1>
    
    <div class="test-area">
        <h2>Test 1: Basic File Input</h2>
        <input type="file" id="basicFileInput" accept=".pdf,.txt">
        <button onclick="testBasicUpload()">Upload</button>
        <div id="basicResult" class="result"></div>
    </div>
    
    <div class="test-area">
        <h2>Test 2: Click Zone Upload</h2>
        <div class="upload-zone" onclick="document.getElementById('clickFileInput').click()">
            Click here to select file
        </div>
        <input type="file" id="clickFileInput" accept=".pdf,.txt" style="display: none;">
        <div id="clickResult" class="result"></div>
    </div>
    
    <div class="test-area">
        <h2>Test 3: Drag & Drop</h2>
        <div class="upload-zone" id="dropZone">
            Drag and drop files here
        </div>
        <div id="dropResult" class="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        
        // Test 1: Basic file input
        async function testBasicUpload() {
            const fileInput = document.getElementById('basicFileInput');
            const resultDiv = document.getElementById('basicResult');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                resultDiv.innerHTML = '<span class="error">No file selected</span>';
                return;
            }
            
            const file = fileInput.files[0];
            resultDiv.innerHTML = '<span>Uploading...</span>';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${API_URL}/documents`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<span class="success">Success!</span><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    const error = await response.text();
                    resultDiv.innerHTML = `<span class="error">Failed: ${response.status}</span><br><pre>${error}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">Error: ${error.message}</span>`;
            }
        }
        
        // Test 2: Click zone
        document.getElementById('clickFileInput').addEventListener('change', async function(e) {
            const resultDiv = document.getElementById('clickResult');
            const file = e.target.files[0];
            
            if (!file) {
                resultDiv.innerHTML = '<span class="error">No file selected</span>';
                return;
            }
            
            resultDiv.innerHTML = '<span>Uploading...</span>';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${API_URL}/documents`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<span class="success">Success!</span><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    const error = await response.text();
                    resultDiv.innerHTML = `<span class="error">Failed: ${response.status}</span><br><pre>${error}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">Error: ${error.message}</span>`;
            }
        });
        
        // Test 3: Drag and drop
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.background = '#e0e0e0';
        });
        
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.background = '#f9f9f9';
        });
        
        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropZone.style.background = '#f9f9f9';
            
            const files = e.dataTransfer.files;
            const resultDiv = document.getElementById('dropResult');
            
            if (files.length === 0) {
                resultDiv.innerHTML = '<span class="error">No files dropped</span>';
                return;
            }
            
            const file = files[0];
            resultDiv.innerHTML = '<span>Uploading...</span>';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${API_URL}/documents`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<span class="success">Success!</span><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    const error = await response.text();
                    resultDiv.innerHTML = `<span class="error">Failed: ${response.status}</span><br><pre>${error}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">Error: ${error.message}</span>`;
            }
        });
    </script>
        <!-- Footer (full width) -->
        <footer class="footer">
            <div class="footer-inner">
                <span>© 2025 Knowledge-base Search Engine</span>
                <span class="footer-divider">•</span>
                <a href="#" class="footer-link">Privacy</a>
                <span class="footer-divider">•</span>
                <a href="#" class="footer-link">About</a>
            </div>
        </footer>
</body>
</html>
